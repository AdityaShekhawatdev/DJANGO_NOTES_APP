version: "3.8"

services:
  django_app:
    build:
      context: .
    image: django_app
    container_name: django_cont
    ports:
      - "8000:8000"
    env_file:
     - ".env"
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app-nw

  nginx:
    build: ./nginx
    image: nginx
    container_name: nginx_cont
    ports:
      - "80:80"
    restart: always
    depends_on:
      - django_app
    networks:
      - notes-app-nw
        

  db:
    image: mysql:8.0.32
    container_name: db_cont
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
      MYSQL_USER: notesuser
      MYSQL_PASSWORD: notespass
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
     - notes-app-nw  
    volumes:
      - db_data:/var/lib/mysql 


networks:
   notes-app-nw:

volumes:
  db_data:




      