apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-app
spec:
  replicaCount: {{ .Values.db.replicaCount}}
  selector:
    matchLabels:
      app: db-app
    template:
      metadata:
        labels:
          app: db-app
      spec:
        containers: 
        - name: db-app
          image: "{{ .Values.db.image.repository}}:{{ .Values.db.image.tag}}"
          pullPolicy: {{ .Values.db.image.pullPolicy}}
        ports:
          - containerPort: {{ .Values.db.service.port}}
        envFrom:
          - secretRef:
              name: db-secret  
        resources:
            requests: 
              cpu: {{ .Values.db.resources.requests.cpu}}
              memory: {{ .Values.db.resources.requests.memory}} 
            limits:
              cpu: {{ .Values.db.resources.limits.cpu}}
              memory: {{ .Values.db.resources.limits.memory}}
        volumeMounts:
          - name: db-storage
            mountPath: /var/lib/mysql
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc              