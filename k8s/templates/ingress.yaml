apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: django-notes.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-notes
                port:
                  number: {{ .Values.notesApp.service.port }}


