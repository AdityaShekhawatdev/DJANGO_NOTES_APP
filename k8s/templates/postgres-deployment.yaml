apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  replicas: {{ .Values.djangoDB.replicaCount }}
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "{{ .Values.djangoDB.image.repository }}:{{ .Values.djangoDB.image.tag }}"
          imagePullPolicy: {{ .Values.djangoDB.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.djangoDB.service.port }}
          resources:
            requests:
              memory: {{ .Values.djangoDB.resources.requests.memory }}
              cpu: {{ .Values.djangoDB.resources.requests.cpu }}
            limits:
              memory: {{ .Values.djangoDB.resources.limits.memory }}
              cpu: {{ .Values.djangoDB.resources.limits.cpu }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: django-secret
                  key: DB_PASSWORD
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: postgres-data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc