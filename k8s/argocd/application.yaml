apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: django-notes
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AdityaShekhawatdev/DJANGO_NOTES_APP.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true